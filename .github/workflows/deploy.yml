name: Deploy App

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- STEP 1: Build the assets inside GitHub ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Assets
        run: |
          npm install
          npm run build

      # --- STEP 2: Deploy everything to your server ---
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Install PHP deps (no-dev)
        run: /opt/alt/php84/usr/bin/php /usr/local/bin/composer2 install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/${{ secrets.SSH_USERNAME }}/domains/solonkarandanis.com
            git fetch --all
            git reset --hard origin/main
            /usr/local/bin/php8.3 artisan migrate --force
            /usr/local/bin/php8.3 artisan config:cache
            /usr/local/bin/php8.3 artisan route:cache
            /usr/local/bin/php8.3 artisan view:cache

      # --- STEP 3: Transfer the built assets separately ---
      # This moves the 'public/build' folder created in Step 1 to your server
      - name: Upload Built Assets
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "public/build/*"
          target: "/home/${{ secrets.SSH_USERNAME }}/domains/solonkarandanis.com/public/build/"
          strip_components: 2
          overwrite: true
